services:
  db:
    image: postgres:15-alpine
    container_name: chat-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: chat-be
    restart: always
    env_file: ./be/.env
    environment:
      - DB_HOST=db
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - ./be/uploads:/app/uploads

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: chat-fe
    restart: always
    env_file: ./fe/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
